<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fighter Jet HUD Simulator</title>
</head>
<body>
    <div id="app">
        <!-- HUDを描画するキャンバス -->
        <canvas id="hudCanvas" width="600" height="500"></canvas>

        <!-- 操作用コントローラー -->
        <div class="controls">
            <div class="control-group">
                <label>ロール (Roll): <span id="rollVal">0</span>°</label>
                <input type="range" id="roll" min="-180" max="180" value="0">
            </div>
            <div class="control-group">
                <label>ピッチ (Pitch): <span id="pitchVal">0</span>°</label>
                <input type="range" id="pitch" min="-90" max="90" value="0">
            </div>
            <div class="control-group">
                <label>速度 (Airspeed): <span id="speedVal">400</span> kt</label>
                <input type="range" id="speed" min="0" max="1200" value="400">
            </div>
            <div class="control-group">
                <label>高度 (Altitude): <span id="altVal">5000</span> ft</label>
                <input type="range" id="alt" min="0" max="40000" value="5000">
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
